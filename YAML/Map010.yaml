      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: ['улыбкой человека, который предлагает детям']}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: [конфеты.]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 101, p: ['', 0, 0, 2]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: ["\"Мама говорила мне не разговаривать с"]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: ['незнакомцами", - ответила я решительным']}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: [голосом.]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 101, p: ['', 0, 0, 2]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: [Он вздохнул.]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 101, p: ['', 0, 0, 2]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: ["\"Я не незнакомец для тебя."]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: ['Человеческая память так недолговечна, не так ли?"']}
      - !ruby/object:RPG::EventCommand {i: 1, c: 101, p: ['', 0, 0, 2]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: ["\"Даже если я действительно знаю тебя, то ты,"]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: ['должно быть, плохой парень", - настаивала я.']}
      - !ruby/object:RPG::EventCommand {i: 1, c: 101, p: ['', 0, 0, 2]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: ['"Я? Плохой? Почему это?"']}
      - !ruby/object:RPG::EventCommand {i: 1, c: 101, p: ['', 0, 0, 2]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: [Я должна была придумать что-нибудь.]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 101, p: ['', 0, 0, 2]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: ['"Это потому что... Все злодеи носят цилиндры."']}
      - !ruby/object:RPG::EventCommand {i: 1, c: 101, p: ['', 0, 0, 2]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: ['"Ох, неужели? Что за глупый предрассудок", -']}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: [прокомментировал мужчина с лёгким смешком.]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 101, p: ['', 0, 0, 2]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: ['"Не дай внешности обмануть тебя".']}
      - !ruby/object:RPG::EventCommand {i: 1, c: 101, p: ['', 0, 0, 2]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: [С этими словами он снял маску.]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 101, p: ['', 0, 0, 2]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: ['Как я и думала, мужчина оказался никем']}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: ['иным, как Человеком-зонтиком собственной']}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: [персоной.]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 101, p: ['', 0, 0, 2]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: ["\"Хоть мне и хотелось поболтать с тобой"]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: ['в этот знаменательный для тебя день года,']}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: [пришёл я по другой причине."]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 101, p: ['', 0, 0, 2]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: [Я наклонила голову от любопытства.]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 101, p: ['', 0, 0, 2]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: ['"Слушай внимательно, малютка."']}
      - !ruby/object:RPG::EventCommand {i: 1, c: 101, p: ['', 0, 0, 2]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: ["\"Я пришёл, чтобы сообщить, что тебе был назначен"]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: ['Кукловод, так как ты достигла возраста десяти лет."']}
      - !ruby/object:RPG::EventCommand {i: 1, c: 101, p: ['', 0, 0, 2]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: ['"Кто это?"']}
      - !ruby/object:RPG::EventCommand {i: 1, c: 101, p: ['', 0, 0, 2]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: ["\"Они представители Истинного Королевства,"]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: ['специально созданные, чтобы наблюдать за']}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: [вашим проблемным видом.]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: ['Тот, кто назначен тебе, - Кукловод типа Сэт."']}
      - !ruby/object:RPG::EventCommand {i: 1, c: 101, p: ['', 0, 0, 2]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: ['Что касается их целей, они здесь для того, чтобы']}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: ['вести вас, Марионеток, через ваши короткие']}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: [жизни."]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 101, p: ['', 0, 0, 2]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: ['"Почему они делают это?"']}
      - !ruby/object:RPG::EventCommand {i: 1, c: 101, p: ['', 0, 0, 2]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: ['"Видишь ли, малютка, свобода воли - это выдумка."']}
      - !ruby/object:RPG::EventCommand {i: 1, c: 101, p: ['', 0, 0, 2]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: ['"М-м-хм-м", - обдумывала я свои слова, пытаясь']}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: [подобрать умный ответ.]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 101, p: ['', 0, 0, 2]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: ["\"Ах, такой подбор слов, должно быть, был слишком"]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: [сложным для ребёнка. Скажем по-другому."]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 101, p: ['', 0, 0, 2]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: ["\"Познакомься со своим новым другом, который"]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: [будет наблюдать за тобой.]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: [Его зовут Сэт."]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 101, p: ['', 0, 0, 2]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: ['"Не слишком-то дразни его, хорошо?"']}
