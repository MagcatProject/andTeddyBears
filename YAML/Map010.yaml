      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: ["「こんばんは、シャルロッテちゃん」 と言って"]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: [子供にアメをあげる人のように微笑んだ。]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 101, p: ['', 0, 0, 2]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: ["「お母さんが知らない人と話さないでって言ってた」"]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: [と言った、果敢な声で。]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 101, p: ['', 0, 0, 2]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: [男の人はため息をついた。]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 101, p: ['', 0, 0, 2]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: ["「シャルロッテちゃんが知らない人ではないよ。"]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: [人間の記憶はとてもはかない、でしょ。」]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 101, p: ['', 0, 0, 2]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: ["「知っていたとしても、きっとあんたは悪いやつだ」"]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: [と言い張った。]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 101, p: ['', 0, 0, 2]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: ["「私？悪いやつ？なんで？」"]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 101, p: ['', 0, 0, 2]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: [何か考えなきゃいけなかった。]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 101, p: ['', 0, 0, 2]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: ["「それは・・・その・・・の悪いやつはみんな"]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: [シルクハットを被ってる。」]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 101, p: ['', 0, 0, 2]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: ["「ああ、そう？なんてばかばかしい偏見だ」"]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: [と言って、少し笑った。]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 101, p: ['', 0, 0, 2]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: ["「この外観に騙されないで」と言いながら"]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 101, p: ['', 0, 0, 2]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: [仮面を取った。]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 101, p: ['', 0, 0, 2]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: [考えていた通り、男の人は傘の人　その人だった。]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 101, p: ['', 0, 0, 2]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: ["「この一年の特別な日に"]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: [シャルロッテちゃんとおしゃべりしたいけど、]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: [別の理由で来たんだ。」]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 101, p: ['', 0, 0, 2]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: [好奇心で首をひねった。]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 101, p: ['', 0, 0, 2]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: ["「よく聞いて、小さなシャルロッテちゃん。」"]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 101, p: ['', 0, 0, 2]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: ["「十歳になったので人形使いがシャルロッテちゃんに"]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: [割り当てられたことをお知らせしにきた。」]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 101, p: ['', 0, 0, 2]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: ["「人形使いって何？」"]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 101, p: ['', 0, 0, 2]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: ["「彼らは実相の世界の代表で、"]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: [シャルロッテちゃんの厄介な種を見守る任務に]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: [割り当てられた。シャルロッテちゃんに]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: [割り当てられたのはセツタイプの人形使いだ。」]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 101, p: ['', 0, 0, 2]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: ["「彼らは彼らの目的のため"]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: [君の短い人生にわたって君、]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: [つまり人形の人間を導くために]}
