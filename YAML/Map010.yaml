      - !ruby/object:RPG::EventCommand {i: 1, c: 101, p: ['', 0, 0, 2]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: ["「どうしてそんな事をするの？」"]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 101, p: ['', 0, 0, 2]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: ["「聞いて、可愛いシャルロッテちゃん、"]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: [自由意志は虚構なんだ。」]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 101, p: ['', 0, 0, 2]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: ["「ああ、そう。」 言葉を噛んで"]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 401, p: [うまい答えを考えようとしていた。]}
      - !ruby/object:RPG::EventCommand {i: 1, c: 101, p: ['', 0, 0, 2]}
